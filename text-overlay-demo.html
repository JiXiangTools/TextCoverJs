<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Text Overlay Demo CDN</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #eef1f5;
        color: #111827;
      }

      main {
        width: min(980px, calc(100vw - 32px));
        margin: 32px auto 64px;
        display: grid;
        gap: 28px;
      }

      .demo-image {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        border: 1px solid #c8d0dc;
        background: #dce3ee;
      }

      .text-overlay-box--editable {
        cursor: text;
      }

      .text-overlay-box--editing {
        background: rgba(255, 255, 255, 0.72) !important;
        box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.85);
      }
    </style>
  </head>
  <body>
    <main>
      <img id="image-1" class="demo-image" alt="City poster test background" />
      <img id="image-2" class="demo-image" alt="Product card test background" />
      <img id="image-3" class="demo-image" alt="Map board test background" />
    </main>

    <script src="./text-cover.global.js?v=1.0.5"></script>
    <script src="./text-cover-demo.js"></script>
  </body>
</html>
